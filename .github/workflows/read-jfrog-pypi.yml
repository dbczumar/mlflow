name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure JFrog credentials for uv via netrc
        run: |
          # Write OIDC credentials to ~/.netrc so uv authenticates automatically.
          # File writes bypass ::add-mask:: log-output substitution, so the raw
          # token is stored correctly. UV_DEFAULT_INDEX (credential-free URL) is
          # safe to write to $GITHUB_ENV.
          JFROG_USER=$(jq -r '.servers[0].user' ~/.jfrog/jfrog-cli.conf.v6)
          JFROG_TOKEN=$(jq -r '.servers[0].accessToken' ~/.jfrog/jfrog-cli.conf.v6)
          echo "::add-mask::$JFROG_TOKEN"
          printf 'machine databrickstemp.jfrog.io\nlogin %s\npassword %s\n' \
            "$JFROG_USER" "$JFROG_TOKEN" >> ~/.netrc
          chmod 600 ~/.netrc
          echo "UV_DEFAULT_INDEX=https://databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"

      - name: Install mlflow from JFrog via uv
        env:
          # JFrog strips upload timestamps from package metadata, so UV_EXCLUDE_NEWER
          # (set in setup-python) would exclude everything. Override it for JFrog installs.
          UV_EXCLUDE_NEWER: "2099-01-01T00:00:00Z"
        run: |
          uv pip install --system --no-deps mlflow
          python -c "import importlib.metadata; print('mlflow', importlib.metadata.version('mlflow'), 'installed via uv + netrc')"
