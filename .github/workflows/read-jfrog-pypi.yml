name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Install mlflow from JFrog
        run: |
          # JFrog OIDC tokens only work as Bearer tokens (not Basic Auth), so uv's
          # URL-embedded credentials won't work. Use jf pip install which handles
          # Bearer auth internally via the JFrog CLI.
          jf pip-config --repo-resolve db-pypi
          jf pip install mlflow --no-deps
          python -c "import importlib.metadata; print('mlflow', importlib.metadata.version('mlflow'), 'installed from JFrog')"
