name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure uv to use JFrog as PyPI index
        run: |
          # Get access token from JFrog CLI config, then construct index URL for uv.
          JF_CONF="$HOME/.jfrog/jfrog-cli.conf.v6"
          echo "JFrog config file exists: $(test -f "$JF_CONF" && echo yes || echo no)"
          if [ -f "$JF_CONF" ]; then
            echo "--- JFrog config (redacted) ---"
            python3 -c "
import json
with open('$JF_CONF') as f:
    conf = json.load(f)
for s in conf.get('servers', []):
    print('server id:', s.get('url',''), 'has token:', bool(s.get('accessToken')))
"
          fi
          ACCESS_TOKEN=$(python3 -c "
import json, sys
with open('$HOME/.jfrog/jfrog-cli.conf.v6') as f:
    conf = json.load(f)
for s in conf.get('servers', []):
    t = s.get('accessToken', '')
    if t:
        print(t)
        sys.exit(0)
sys.exit(1)
")
          INDEX_URL="https://${ACCESS_TOKEN}@databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple"
          echo "::add-mask::$ACCESS_TOKEN"
          echo "::add-mask::$INDEX_URL"
          echo "UV_INDEX_URL=$INDEX_URL" >> $GITHUB_ENV

      - name: Install dependencies from JFrog
        run: uv sync --locked
