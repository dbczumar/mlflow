name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure uv to use JFrog as PyPI index
        run: |
          # Extract the OIDC-provisioned access token from the JFrog CLI config.
          # Write credentials to ~/.netrc so uv can authenticate without embedding
          # them in the URL (avoids percent-encoding issues with access tokens).
          ACCESS_TOKEN=$(jq -r '
            .servers[]
            | select(.accessToken != null and .accessToken != "")
            | .accessToken' \
            ~/.jfrog/jfrog-cli.conf.v6 | head -1)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: could not find access token in JFrog CLI config"
            exit 1
          fi
          echo "::add-mask::$ACCESS_TOKEN"
          printf 'machine databrickstemp.jfrog.io login token password %s\n' "$ACCESS_TOKEN" >> ~/.netrc
          chmod 600 ~/.netrc
          echo "UV_INDEX_URL=https://databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> $GITHUB_ENV

      - name: Install mlflow from JFrog
        env:
          # Override pyproject.toml exclude-newer so uv doesn't filter out packages
          # whose upload timestamps aren't exposed by the JFrog simple index.
          UV_EXCLUDE_NEWER: "2099-01-01T00:00:00Z"
        run: uv pip install --system --index-url "$UV_INDEX_URL" mlflow
