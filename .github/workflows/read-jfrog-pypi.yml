name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure uv to use JFrog as PyPI index
        run: |
          # Extract the OIDC-provisioned access token (and user if present) from the
          # JFrog CLI config and construct an authenticated index URL for uv.
          # JFrog requires user:token URL format — use "token" as the username when
          # no explicit user is configured (access tokens work with any non-empty user).
          ACCESS_TOKEN=$(jq -r '
            .servers[]
            | select(.accessToken != null and .accessToken != "")
            | .accessToken' \
            ~/.jfrog/jfrog-cli.conf.v6 | head -1)
          USER=$(jq -r '
            .servers[]
            | select(.accessToken != null and .accessToken != "")
            | (.user // "token")' \
            ~/.jfrog/jfrog-cli.conf.v6 | head -1)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: could not find access token in JFrog CLI config"
            exit 1
          fi
          # Percent-encode the token so special characters don't break the URL.
          ACCESS_TOKEN_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$ACCESS_TOKEN")
          INDEX_URL="https://${USER}:${ACCESS_TOKEN_ENC}@databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple"
          echo "::add-mask::$ACCESS_TOKEN"
          echo "::add-mask::$ACCESS_TOKEN_ENC"
          echo "::add-mask::$INDEX_URL"
          echo "UV_INDEX_URL=$INDEX_URL" >> $GITHUB_ENV

      - name: Install mlflow from JFrog
        run: uv pip install --system --index-url "$UV_INDEX_URL" mlflow
