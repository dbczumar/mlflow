name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Install mlflow from JFrog via jf pip
        run: |
          jf pip-config --repo-resolve db-pypi
          jf pip install mlflow --no-deps
          python -c "import importlib.metadata; print('mlflow', importlib.metadata.version('mlflow'), 'installed via jf pip')"

      - name: Install mlflow from JFrog via uv
        run: |
          # Extract JFrog OIDC username + access token, then feed directly to uv.
          # We use them inline (not via $GITHUB_ENV) to avoid the ::add-mask:: URL-replacement bug.
          JFROG_USER=$(jq -r '.servers[0].user' ~/.jfrog/jfrog-cli.conf.v6)
          JFROG_TOKEN=$(jq -r '.servers[0].accessToken' ~/.jfrog/jfrog-cli.conf.v6)
          echo "::add-mask::$JFROG_TOKEN"
          echo "JFrog user: $JFROG_USER"
          JFROG_INDEX="https://${JFROG_USER}:${JFROG_TOKEN}@databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple"
          uv pip install --system \
            --index-url "$JFROG_INDEX" \
            --no-deps \
            mlflow
          python -c "import importlib.metadata; print('mlflow', importlib.metadata.version('mlflow'), 'installed via uv')"
