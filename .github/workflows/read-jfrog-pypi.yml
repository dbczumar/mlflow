name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure uv to use JFrog as PyPI index
        run: |
          # Extract the OIDC-provisioned access token from the JFrog CLI config and
          # construct an authenticated index URL for uv.
          ACCESS_TOKEN=$(jq -r '
            .servers[]
            | select(.accessToken != null and .accessToken != "")
            | .accessToken' \
            ~/.jfrog/jfrog-cli.conf.v6 | head -1)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: could not find access token in JFrog CLI config"
            exit 1
          fi
          INDEX_URL="https://${ACCESS_TOKEN}@databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple"
          echo "::add-mask::$ACCESS_TOKEN"
          echo "::add-mask::$INDEX_URL"
          # Use as extra index so packages missing from JFrog fall back to PyPI.
          echo "UV_EXTRA_INDEX_URL=$INDEX_URL" >> $GITHUB_ENV

      - name: Install dependencies from JFrog
        run: uv sync --locked
