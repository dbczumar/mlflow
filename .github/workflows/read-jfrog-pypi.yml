name: Read from JFrog PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Install mlflow from JFrog via uv
        env:
          # Override pyproject.toml exclude-newer so uv doesn't filter out packages
          # whose upload timestamps aren't exposed by the JFrog simple index.
          UV_EXCLUDE_NEWER: "2099-01-01T00:00:00Z"
        run: |
          # Extract the OIDC-provisioned access token and percent-encode it for use
          # in the index URL. Build and use the URL in the same step to avoid
          # GitHub Actions masking the value in $GITHUB_ENV before uv can read it.
          ACCESS_TOKEN=$(jq -r '
            .servers[]
            | select(.accessToken != null and .accessToken != "")
            | .accessToken' \
            ~/.jfrog/jfrog-cli.conf.v6 | head -1)
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: could not find access token in JFrog CLI config"
            exit 1
          fi
          ACCESS_TOKEN_ENC=$(python3 -c \
            "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" \
            "$ACCESS_TOKEN")
          echo "::add-mask::$ACCESS_TOKEN"
          INDEX_URL="https://token:${ACCESS_TOKEN_ENC}@databrickstemp.jfrog.io/artifactory/api/pypi/db-pypi/simple"
          RUST_LOG=uv_client=debug UV_INDEX_URL="$INDEX_URL" uv pip install --system --verbose mlflow 2>&1 | head -40
