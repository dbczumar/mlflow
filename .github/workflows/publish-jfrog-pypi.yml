name: JFrog PyPI mirror

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "mlflow/server/js/**"

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.repository == 'dbczumar/mlflow'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required for JFrog OIDC authentication
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-python

      - name: Set up JFrog CLI with OIDC
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: https://databrickstemp.jfrog.io
        with:
          oidc-provider-name: jfrogtestingcoreyzumaroidc

      - name: Configure uv to use JFrog as PyPI index
        run: |
          # Configure pip to use JFrog's virtual PyPI repo, then pass the
          # resulting index URL (with embedded auth token) to uv via UV_INDEX_URL.
          jf pip-config --repo-resolve db-pypi
          INDEX_URL=$(pip config get index-url)
          echo "::add-mask::$INDEX_URL"
          echo "UV_INDEX_URL=$INDEX_URL" >> $GITHUB_ENV

      - name: Install dependencies from JFrog
        run: uv sync --locked
